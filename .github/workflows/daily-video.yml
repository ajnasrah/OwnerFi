name: Daily Video Pipeline

on:
  schedule:
    # Property videos: EN at 10:00am CST = 16:00 UTC
    - cron: '0 16 * * *'
    # Property videos: ES at 10:30am CST = 16:30 UTC  
    - cron: '30 16 * * *'
    # Trending articles: EN at 2:00pm CST = 20:00 UTC
    - cron: '0 20 * * *'
    # Trending articles: ES at 2:30pm CST = 20:30 UTC
    - cron: '30 20 * * *'
    # R2 cleanup every Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      video_type:
        description: 'Type of video to generate'
        required: true
        default: 'property'
        type: choice
        options: [property, trending, both]
      lang:
        description: 'Language to generate'
        required: true
        default: 'en'
        type: choice
        options: [en, es, both]
      dry_run:
        description: 'Dry run (script preview, no video/post)'
        required: false
        default: 'false'
        type: boolean

jobs:
  # ─── Weekly R2 cleanup (deletes card images >7 days old) ───
  cleanup:
    if: github.event.schedule == '0 0 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: NEXT_PUBLIC_FIREBASE_API_KEY
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm ci
    - name: Cleanup old R2 card images
      run: npx tsx scripts/cleanup-r2-cards.ts
      env:
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

  # ─── Daily video generation ───
  video:
    if: github.event.schedule != '0 0 * * 0' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: NEXT_PUBLIC_FIREBASE_API_KEY

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    # Only needed for property videos (card generation uses Puppeteer)
    - name: Install Puppeteer system dependencies
      if: github.event.schedule == '0 16 * * *' || github.event.schedule == '30 16 * * *' || (github.event_name == 'workflow_dispatch' && (inputs.video_type == 'property' || inputs.video_type == 'both'))
      run: |
        sudo apt-get update
        sudo apt-get install -y libgbm1 libnss3 libatk-bridge2.0-0 libxcomposite1 libxrandr2 libxdamage1 libcups2 libdrm2 libpango-1.0-0 libcairo2 libasound2t64 || \
        sudo apt-get install -y libgbm1 libnss3 libatk-bridge2.0-0 libxcomposite1 libxrandr2 libxdamage1 libcups2 libdrm2 libpango-1.0-0 libcairo2 libasound2

    - name: Determine video type and language
      id: config
      run: |
        if [ "${{ github.event_name }}" = "schedule" ]; then
          case "${{ github.event.schedule }}" in
            "0 16 * * *")   echo "type=property" >> $GITHUB_OUTPUT; echo "lang=en" >> $GITHUB_OUTPUT ;;
            "30 16 * * *")  echo "type=property" >> $GITHUB_OUTPUT; echo "lang=es" >> $GITHUB_OUTPUT ;;
            "0 20 * * *")   echo "type=trending" >> $GITHUB_OUTPUT; echo "lang=en" >> $GITHUB_OUTPUT ;;
            "30 20 * * *")  echo "type=trending" >> $GITHUB_OUTPUT; echo "lang=es" >> $GITHUB_OUTPUT ;;
            *) echo "type=property" >> $GITHUB_OUTPUT; echo "lang=en" >> $GITHUB_OUTPUT ;;
          esac
        else
          echo "type=${{ inputs.video_type || 'property' }}" >> $GITHUB_OUTPUT
          echo "lang=${{ inputs.lang || 'en' }}" >> $GITHUB_OUTPUT
        fi

    - name: Run video pipeline
      run: |
        DRY_FLAG=""
        if [ "${{ inputs.dry_run }}" = "true" ]; then DRY_FLAG="--dry-run"; fi
        
        if [ "${{ steps.config.outputs.type }}" = "trending" ]; then
          echo "🚀 Running TRENDING article video pipeline..."
          npx tsx scripts/trending-article-video.ts --lang ${{ steps.config.outputs.lang }} $DRY_FLAG
        elif [ "${{ steps.config.outputs.type }}" = "both" ]; then
          echo "🚀 Running BOTH property + trending video pipelines..."
          npx tsx scripts/ownerfi-daily-video.ts --lang ${{ steps.config.outputs.lang }} $DRY_FLAG
          npx tsx scripts/trending-article-video.ts --lang ${{ steps.config.outputs.lang }} $DRY_FLAG
        else
          echo "🚀 Running PROPERTY video pipeline..."
          npx tsx scripts/ownerfi-daily-video.ts --lang ${{ steps.config.outputs.lang }} $DRY_FLAG
        fi
      env:
        # Firebase (Firestore rotation state + articles)
        NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
        FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
        FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        # Typesense (property search)
        TYPESENSE_HOST: ${{ secrets.TYPESENSE_HOST }}
        TYPESENSE_API_KEY: ${{ secrets.TYPESENSE_API_KEY }}
        # Cloudflare R2 (card images + cards JSON)
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        # OpenAI (script generation)
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        # Creatify (video rendering)
        CREATIFY_API_ID: ${{ secrets.CREATIFY_API_ID }}
        CREATIFY_API_KEY: ${{ secrets.CREATIFY_API_KEY }}
        # Late.dev (social media posting)
        LATE_API_KEY: ${{ secrets.LATE_API_KEY }}
        LATE_OWNERFI_PROFILE_ID: ${{ secrets.LATE_OWNERFI_PROFILE_ID }}
