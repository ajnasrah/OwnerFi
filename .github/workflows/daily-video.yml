name: Daily Video Pipeline

on:
  schedule:
    # EN at 11:00am CDT (UTC-5) = 16:00 UTC
    - cron: '0 16 * * *'
    # ES at 11:30am CDT (UTC-5) = 16:30 UTC
    - cron: '30 16 * * *'
    # R2 cleanup every Sunday at midnight UTC
    - cron: '0 0 * * 0'
    # Note: During CST (Nov-Mar), video runs at 10:00/10:30am local.
  workflow_dispatch:
    inputs:
      lang:
        description: 'Language to generate'
        required: true
        default: 'en'
        type: choice
        options: [en, es, both]
      dry_run:
        description: 'Dry run (script preview, no video/post)'
        required: false
        default: 'false'
        type: boolean

jobs:
  # ─── Weekly R2 cleanup (deletes card images >7 days old) ───
  cleanup:
    if: github.event.schedule == '0 0 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: NEXT_PUBLIC_FIREBASE_API_KEY
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    - run: npm ci
    - name: Cleanup old R2 card images
      run: npx tsx scripts/cleanup-r2-cards.ts
      env:
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

  # ─── Daily video generation ───
  video:
    if: github.event.schedule != '0 0 * * 0' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: NEXT_PUBLIC_FIREBASE_API_KEY

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    # Only needed for EN (card generation uses Puppeteer)
    - name: Install Puppeteer system dependencies
      if: github.event.schedule != '30 16 * * *'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgbm1 libnss3 libatk-bridge2.0-0 libxcomposite1 libxrandr2 libxdamage1 libcups2 libdrm2 libpango-1.0-0 libcairo2 libasound2t64

    - name: Determine language
      id: lang
      run: |
        if [ "${{ github.event_name }}" = "schedule" ]; then
          if [ "${{ github.event.schedule }}" = "0 16 * * *" ]; then
            echo "lang=en" >> $GITHUB_OUTPUT
          else
            echo "lang=es" >> $GITHUB_OUTPUT
          fi
        else
          echo "lang=${{ inputs.lang || 'en' }}" >> $GITHUB_OUTPUT
        fi

    - name: Run video pipeline
      run: |
        DRY_FLAG=""
        if [ "${{ inputs.dry_run }}" = "true" ]; then DRY_FLAG="--dry-run"; fi
        npx tsx scripts/ownerfi-daily-video.ts --lang ${{ steps.lang.outputs.lang }} $DRY_FLAG
      env:
        # Firebase (Firestore rotation state)
        FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
        FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        # Typesense (property search)
        TYPESENSE_HOST: ${{ secrets.TYPESENSE_HOST }}
        TYPESENSE_API_KEY: ${{ secrets.TYPESENSE_API_KEY }}
        # Cloudflare R2 (card images + cards JSON)
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        # OpenAI (script generation)
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        # Creatify (video rendering)
        CREATIFY_API_ID: ${{ secrets.CREATIFY_API_ID }}
        CREATIFY_API_KEY: ${{ secrets.CREATIFY_API_KEY }}
        # Late.dev (social media posting)
        LATE_API_KEY: ${{ secrets.LATE_API_KEY }}
        LATE_OWNERFI_PROFILE_ID: ${{ secrets.LATE_OWNERFI_PROFILE_ID }}
